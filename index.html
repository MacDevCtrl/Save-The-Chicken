<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Save George</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #333;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    #app-container {
      position: relative;
      width: 800px;
      height: 600px;
      background-color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
      border-radius: 8px;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      box-sizing: border-box;
    }
    .story-text {
      font-size: 24px;
      line-height: 1.5;
      text-align: center;
      margin-bottom: 30px;
      max-width: 650px;
      color: #111;
      font-weight: bold;
    }
    .btn {
      padding: 12px 24px;
      margin: 8px;
      font-size: 18px;
      cursor: pointer;
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      width: 80%;
      max-width: 400px;
      font-weight: bold;
    }
    .name-input {
      padding: 12px;
      font-size: 18px;
      margin-bottom: 20px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 250px;
    }
  </style>
</head>
<body>
  <div id="app-container">
    <div id="ui-layer"></div>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
